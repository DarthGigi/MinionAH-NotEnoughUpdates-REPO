name: Update Recipes

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update-recipes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git remote add upstream https://github.com/NotEnoughUpdates/NotEnoughUpdates-REPO.git

      - name: Prepare upstream source
        run: |
          git fetch upstream
          git worktree add --detach ../upstream-source upstream/master
          mkdir -p ../upstream-source/recipes

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: ../upstream-source/scripts

      - name: Run script
        run: bun update-recipes
        working-directory: ../upstream-source/scripts

      - name: Copy generated recipes
        run: |
          cp ../upstream-source/recipes/recipes.json recipes/recipes.json
          git worktree remove ../upstream-source --force

      - name: Commit changes
        run: |
          if ! git diff --quiet -- recipes/recipes.json; then
            git add recipes/recipes.json
            git commit -m "Update recipes.json"
            git push origin HEAD:master
          else
            echo "No recipe changes to commit"
          fi
